vault:
  secretsEnabled: true

networkPolicies:
  enabled: true

postgres:
  enabled: true
  existingSecret: schnappy-postgres
  image: postgres:17-alpine
  extraDatabases:
    - monitor_admin
    - monitor_chat
    - monitor_chess
    - keycloak
  sharedBuffers: 4GB
  effectiveCacheSize: 12GB
  workMem: 64MB
  maintenanceWorkMem: 512MB
  maxParallelWorkersPerGather: 4
  maxParallelWorkers: 6
  maxWorkerProcesses: 10
  effectiveIoConcurrency: 200
  randomPageCost: "1.1"
  storage:
    size: 20Gi
    storageClass: local-path
  resources:
    requests: { cpu: 1000m, memory: 4Gi }
    limits: { cpu: 4000m, memory: 8Gi }

redis:
  enabled: true
  existingSecret: schnappy-redis
  image: redis:7-alpine
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 4Gi }

kafka:
  enabled: true
  existingSecret: schnappy-kafka
  image: apache/kafka:4.2.0
  javaOpts: -Xmx3g -Xms3g
  retention:
    hours: 168
    bytes: "10737418240"
  storage:
    size: 10Gi
    storageClass: local-path
  resources:
    requests: { cpu: 1000m, memory: 4Gi }
    limits: { cpu: 4000m, memory: 8Gi }
  topics:
    - name: chat.messages
      partitions: 12
      replicationFactor: 1
    - name: chat.events
      partitions: 6
      replicationFactor: 1
    - name: chat.notifications
      partitions: 3
      replicationFactor: 1
    - name: chess.moves
      partitions: 6
      replicationFactor: 1
    - name: user.events
      partitions: 3
      replicationFactor: 1

scylla:
  enabled: true
  image: scylladb/scylla:6.2
  args:
    - --smp=2
    - --memory=2G
    - --overprovisioned=1
  storage:
    size: 20Gi
    storageClass: local-path
  resources:
    requests: { cpu: 500m, memory: 2Gi }
    limits: { cpu: 4000m, memory: 4Gi }

minio:
  enabled: true
  existingSecret: schnappy-minio
  bucket: email-attachments
  image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
  storage:
    size: 20Gi
    storageClass: local-path
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 1Gi }

aptCache:
  enabled: true
  storage:
    size: 10Gi
    storageClass: local-path
