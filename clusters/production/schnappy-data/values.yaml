vault:
  secretsEnabled: true

networkPolicies:
  enabled: true

postgres:
  enabled: false
  existingSecret: schnappy-postgres
  image: postgres:17-alpine
  extraDatabases:
    - monitor_admin
    - monitor_chat
    - monitor_chess
  sharedBuffers: 512MB
  effectiveCacheSize: 2GB
  workMem: 32MB
  maintenanceWorkMem: 128MB
  maxParallelWorkersPerGather: 4
  maxParallelWorkers: 6
  maxWorkerProcesses: 10
  effectiveIoConcurrency: 200
  randomPageCost: "1.1"
  storage:
    size: 20Gi
    storageClass: local-path
  resources:
    requests: { cpu: 250m, memory: 1Gi, ephemeral-storage: 256Mi }
    limits: { cpu: 4000m, memory: 2Gi, ephemeral-storage: 1Gi }

redis:
  enabled: true
  existingSecret: schnappy-redis
  image: redis:7-alpine
  resources:
    requests: { cpu: 100m, memory: 64Mi, ephemeral-storage: 64Mi }
    limits: { cpu: 1000m, memory: 512Mi, ephemeral-storage: 256Mi }

kafka:
  enabled: false
  existingSecret: schnappy-kafka
  image: apache/kafka:4.2.0
  javaOpts: -Xmx1g -Xms1g
  retention:
    hours: 168
    bytes: "10737418240"
  storage:
    size: 10Gi
    storageClass: local-path
  resources:
    requests: { cpu: 250m, memory: 1536Mi, ephemeral-storage: 256Mi }
    limits: { cpu: 2000m, memory: 2Gi, ephemeral-storage: 1Gi }
  topics:
    - name: chat.messages
      partitions: 12
      replicationFactor: 1
    - name: chat.events
      partitions: 6
      replicationFactor: 1
    - name: chat.notifications
      partitions: 3
      replicationFactor: 1
    - name: chess.moves
      partitions: 6
      replicationFactor: 1
    - name: user.events
      partitions: 3
      replicationFactor: 1

scylla:
  enabled: true
  image: scylladb/scylla:6.2
  args:
    - --smp=2
    - --memory=2G
    - --overprovisioned=1
  storage:
    size: 20Gi
    storageClass: local-path
  resources:
    requests: { cpu: 200m, memory: 2Gi, ephemeral-storage: 256Mi }
    limits: { cpu: 4000m, memory: 4Gi, ephemeral-storage: 1Gi }

minio:
  enabled: true
  existingSecret: schnappy-minio
  bucket: email-attachments
  buckets:
    - email-attachments
    - mimir-blocks
    - tempo-traces
    - hyperfoil-reports
    - postgres-backups
  image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
  storage:
    size: 20Gi
    storageClass: local-path
  resources:
    requests: { cpu: 100m, memory: 256Mi, ephemeral-storage: 128Mi }
    limits: { cpu: 1000m, memory: 1Gi, ephemeral-storage: 512Mi }

strimzi:
  enabled: true

cnpg:
  enabled: true
  import: false
  backup: true
  backupEndpoint: http://192.168.11.5:9000
  backupSecret: schnappy-minio-backup

aptCache:
  enabled: true
  resources:
    requests: { cpu: 25m, memory: 32Mi, ephemeral-storage: 64Mi }
    limits: { cpu: 200m, memory: 128Mi, ephemeral-storage: 256Mi }
  storage:
    size: 10Gi
    storageClass: local-path
