vault:
  secretsEnabled: true

networkPolicies:
  enabled: true

keycloak:
  enabled: true
  existingSecret: schnappy-keycloak
  image: git.pmon.dev/schnappy/keycloak-theme:2e6199b  # keycloak-theme
  hostname: auth.pmon.dev
  mail:
    from: noreply@pmon.dev
  clients:
    app:
      enabled: true
      redirectUri: "https://pmon.dev/auth/callback"
    forgejo:
      enabled: true
      redirectUri: "https://git.pmon.dev/user/oauth2/Keycloak/callback"
    grafana:
      enabled: true
      redirectUri: "https://grafana.pmon.dev/login/generic_oauth"
    adminService:
      enabled: true
    argocd:
      enabled: true
      host: cd.pmon.dev
    k6Smoke:
      enabled: true
  resources:
    requests: { cpu: 200m, memory: 1Gi }
    limits: { cpu: 2000m, memory: 2Gi }
  ingress:
    enabled: false

# Cross-chart references (keycloak realm SMTP config)
mail:
  enabled: true
  existingSecret: schnappy-mail
  host: smtp.resend.com
  port: "587"
  username: resend
  fromAddress: noreply@pmon.dev
