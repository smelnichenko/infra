peerAuthentication:
  enabled: true
  mode: STRICT
  # No port-level exceptions needed — MetalLB assigns IP directly to
  # Istio gateway pod. No Traefik proxy in between. All traffic enters
  # the mesh via the gateway, which handles its own TLS.

authorizationPolicies:
  enabled: true

gateway:
  enabled: true
  loadBalancerIP: "192.168.11.2"
  tls:
    clusterIssuer: letsencrypt-prod
  hosts:
    app: pmon.dev
    auth: auth.pmon.dev
    grafana: grafana.pmon.dev
    logs: logs.pmon.dev
    reports: reports.pmon.dev
    sonar: sonar.pmon.dev
    argocd: cd.pmon.dev
    forgejo: git.pmon.dev
    ci: ci.pmon.dev

jwt:
  enabled: true
  issuer: https://auth.pmon.dev/realms/schnappy
  jwksUri: http://schnappy-keycloak:8080/realms/schnappy/protocol/openid-connect/certs
