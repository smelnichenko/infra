peerAuthentication:
  enabled: true
  mode: PERMISSIVE
  # PERMISSIVE required: Istio gateway has dataplane-mode: none (set by Istio
  # itself), cannot participate in HBONE mTLS. Mesh-to-mesh traffic auto-upgrades
  # to mTLS. AuthorizationPolicies enforce identity-based access on data stores.

authorizationPolicies:
  enabled: true

gateway:
  enabled: true
  replicas: 2
  loadBalancerIP: "192.168.11.2"
  tls:
    clusterIssuer: letsencrypt-prod
  hosts:
    app: pmon.dev
    auth: auth.pmon.dev
    grafana: grafana.pmon.dev
    logs: logs.pmon.dev
    reports: reports.pmon.dev
    sonar: sonar.pmon.dev
    argocd: cd.pmon.dev
    forgejo: git.pmon.dev
    ci: ci.pmon.dev

jwt:
  enabled: true
  issuer: https://auth.pmon.dev/realms/schnappy
  jwksUri: https://auth.pmon.dev/realms/schnappy/protocol/openid-connect/certs
  passthroughHosts:
    - git.pmon.dev
    - sonar.pmon.dev
    - ci.pmon.dev
    - auth.pmon.dev
    - cd.pmon.dev
    - grafana.pmon.dev
    - logs.pmon.dev
    - reports.pmon.dev
