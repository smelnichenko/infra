peerAuthentication:
  enabled: true
  mode: PERMISSIVE
  # PERMISSIVE needed because non-mesh namespaces (forgejo, argocd,
  # woodpecker) connect to the Istio gateway via ClusterIP.
  # STRICT blocks their plaintext-over-ztunnel connections.

authorizationPolicies:
  enabled: true

gateway:
  enabled: true
  loadBalancerIP: "192.168.11.2"
  tls:
    clusterIssuer: letsencrypt-prod
  hosts:
    app: pmon.dev
    auth: auth.pmon.dev
    grafana: grafana.pmon.dev
    logs: logs.pmon.dev
    reports: reports.pmon.dev
    sonar: sonar.pmon.dev
    argocd: cd.pmon.dev
    forgejo: git.pmon.dev
    ci: ci.pmon.dev

jwt:
  enabled: true
  issuer: https://auth.pmon.dev/realms/schnappy
  jwksUri: https://auth.pmon.dev/realms/schnappy/protocol/openid-connect/certs
