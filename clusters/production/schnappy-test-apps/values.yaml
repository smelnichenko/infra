vault:
  secretsEnabled: true
  secretPathPrefix: "secret/data/schnappy-test"

app:
  replicas: 1
  javaOpts: -Xmx1g -XX:+UseZGC
  image:
    pullPolicy: IfNotPresent
    repository: git.pmon.dev/schnappy/monitor
    tag: "f689ca0"  # monitor
  ingress:
    enabled: false
  resources:
    requests: { cpu: 50m, memory: 512Mi }
    limits: { cpu: 2000m, memory: 2Gi }

site:
  enabled: true
  replicas: 1
  dnsResolver: "10.43.0.10"
  image:
    pullPolicy: IfNotPresent
    repository: git.pmon.dev/schnappy/site
    tag: "471283b"  # site
  resources:
    requests: { cpu: 10m, memory: 32Mi }
    limits: { cpu: 500m, memory: 128Mi }

games:
  - name: game-scp
    path: game
    image:
      repository: git.pmon.dev/schnappy/game-scp
      tag: "b8b7ef8"  # game-scp
    resources:
      requests: { cpu: 10m, memory: 32Mi }
      limits: { cpu: 100m, memory: 128Mi }

auth:
  existingSecret: schnappy-test-auth
  registrationEnabled: true
  secureCookies: true
  tokenExpiration: 1h
  registrationApproval:
    mode: ai
    defaultGroup: Users

captcha:
  enabled: false

chess:
  enabled: true

chat:
  e2eEnabled: false

monitor:
  enabled: true
  http:
    connectTimeout: 10s
    readTimeout: 30s
    userAgent: MonitorBot/1.0

networkPolicies:
  enabled: true

strimzi:
  enabled: true

cnpg:
  enabled: true

scyllaOperator:
  enabled: true

ai:
  enabled: true
  existingSecret: schnappy-test-ai
  model: claude-haiku-4-5-20251001

mail:
  enabled: false

webhook:
  enabled: false

admin:
  enabled: true
  image:
    repository: git.pmon.dev/schnappy/admin
    pullPolicy: IfNotPresent
    tag: "d3e77ff"  # admin
  replicas: 1
  javaOpts: -Xmx512m -XX:+UseZGC
  resources:
    requests: { cpu: 50m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 1Gi }

chatService:
  enabled: true
  image:
    repository: git.pmon.dev/schnappy/chat
    pullPolicy: IfNotPresent
    tag: "f27f47e"  # chat
  replicas: 1
  javaOpts: -Xmx512m -XX:+UseZGC
  resources:
    requests: { cpu: 50m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 1Gi }

chessService:
  enabled: true
  image:
    repository: git.pmon.dev/schnappy/chess
    pullPolicy: IfNotPresent
    tag: "383889b"  # chess
  replicas: 1
  javaOpts: -Xmx512m -XX:+UseZGC
  resources:
    requests: { cpu: 50m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 1Gi }

tracing:
  enabled: true
  tempoEndpoint: "http://schnappy-tempo.schnappy-infra.svc:4318/v1/traces"
  samplingProbability: "1.0"

smokeTest:
  enabled: true
  image: grafana/k6:1.7.1
  baseUrl: https://test.pmon.dev
  clientSecretName: schnappy-k6-smoke

hyperfoil:
  enabled: false

postgres:
  database: monitor
  existingSecret: schnappy-test-postgres
valkey:
  existingSecret: schnappy-test-valkey
minio:
  existingSecret: schnappy-test-minio
alertmanager:
  enabled: false
keycloak:
  enabled: false
  hostname: auth.pmon.dev
