scyllaOperator:
  enabled: false

peerAuthentication:
  enabled: true
  mode: STRICT

authorizationPolicies:
  enabled: false

gateway:
  enabled: true
  infraOnly: true
  replicas: 2
  loadBalancerIP: "192.168.11.2"
  allowedNamespaces:
    - schnappy-production
    - schnappy-test
  tls:
    clusterIssuer: letsencrypt-prod
  hosts:
    app: pmon.dev
    argocd: cd.pmon.dev
    ci: ci.pmon.dev
    hubble: hubble.pmon.dev

jwt:
  enabled: true
  issuer: https://auth.pmon.dev/realms/schnappy
  jwksUri: https://auth.pmon.dev/realms/schnappy/protocol/openid-connect/certs
  passthroughHosts:
    - git.pmon.dev
    - sonar.pmon.dev
    - ci.pmon.dev
    - auth.pmon.dev
    - cd.pmon.dev
    - grafana.pmon.dev
    - logs.pmon.dev
    - reports.pmon.dev
    - hubble.pmon.dev
    - alerts.pmon.dev
