# Plan 067 — wildcard TLS for ephemeral PR preview envs.
# DNS-01 via the existing Porkbun webhook ClusterIssuer.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: preview-pmon-dev-wildcard
  namespace: istio-system
spec:
  secretName: preview-pmon-dev-tls
  issuerRef:
    name: letsencrypt-prod-porkbun
    kind: ClusterIssuer
  dnsNames:
    - "*.preview.pmon.dev"
