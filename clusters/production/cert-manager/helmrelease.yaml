# NOTE: cert-manager is currently installed via kubectl apply (not Helm).
# Switching to this HelmRelease requires first removing the existing installation:
#   kubectl delete -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
# Then unsuspend this HelmRelease. CRDs will be reinstalled by the chart.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  suspend: true
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: cert-manager
      version: "1.17.2"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    crds:
      enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    webhook:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          cpu: 250m
          memory: 128Mi
    cainjector:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 256Mi
