# ClusterIssuers for Let's Encrypt
# HTTP-01 for public hosts, DNS-01 (Porkbun) for internal hosts
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: sergei.melnichenko@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: traefik
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: sergei.melnichenko@gmail.com
    privateKeySecretRef:
      name: letsencrypt-dns
    solvers:
      - dns01:
          webhook:
            groupName: porkbun.talinx.dev
            solverName: porkbun
            config:
              apiKeySecretRef:
                name: porkbun-secret
                key: PORKBUN_API_KEY
              secretApiKeySecretRef:
                name: porkbun-secret
                key: PORKBUN_SECRET_API_KEY
        selector:
          dnsZones:
            - pmon.dev
