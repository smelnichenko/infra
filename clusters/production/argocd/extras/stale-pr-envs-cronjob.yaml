# PR-env cleanup policy + Vault GC.
#
# Daily sweep that:
#   1. For every Argo CD Application labelled preview-env=true (i.e.
#      schnappy-pr-<N>): if the source PR has been closed > 24h, OR
#      head SHA hasn't changed in > 7d, force-prune.
#   2. For every Vault prefix matching `secret/schnappy-pr-*/`: if no
#      live Argo CD Application matches, purge the entire prefix
#      (calls the Vault metadata DELETE API for full purge — same as
#      `task deploy:delete-environment`).
#
# Vault token requirements: a scoped token (NOT the root token) at
# secret/argocd/vault-cleanup-token { token: <hvs.…> }, issued once
# under a policy with `list` on `secret/metadata/` and `delete` on
# `secret/metadata/schnappy-pr-*` only. ESO syncs into Secret
# `vault-cleanup-token` in argocd ns. If the Secret is absent, the
# Vault GC step logs a warning and skips — the Argo CD prune step
# still runs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stale-pr-envs-sweeper
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stale-pr-envs-sweeper
  namespace: argocd
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: stale-pr-envs-sweeper
  namespace: argocd
subjects:
  - kind: ServiceAccount
    name: stale-pr-envs-sweeper
    namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: stale-pr-envs-sweeper
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-cleanup-token
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: vault-cleanup-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: argocd/vault-cleanup-token
        property: token
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: stale-pr-envs-sweeper
  namespace: argocd
spec:
  schedule: "0 6 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: stale-pr-envs-sweeper
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: sweeper
              image: alpine/k8s:1.34.0
              env:
                - name: FORGEJO_API
                  value: https://git.pmon.dev/api/v1
                - name: FORGEJO_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: forgejo-readonly-token
                      key: token
                # Use the same address ESO uses (Pi VIP, port 8200);
                # vault.pmon.dev isn't fronted by Caddy.
                - name: VAULT_ADDR
                  value: https://192.168.11.5:8200
                - name: VAULT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: vault-cleanup-token
                      key: token
                      optional: true
                - name: STALE_DAYS
                  value: "7"
                - name: CLOSED_GRACE_HOURS
                  value: "24"
              command:
                - sh
                - -c
                - |
                  set -eu
                  now_epoch=$(date -u +%s)
                  closed_grace=$(( CLOSED_GRACE_HOURS * 3600 ))
                  stale_secs=$(( STALE_DAYS * 86400 ))

                  # ── 1. Argo CD Application prune ─────────────────────
                  kubectl get application -n argocd -l preview-env=true \
                    -o json | jq -r '.items[] | [.metadata.name, .metadata.labels."pr-number", .metadata.labels."source-repo", .status.history[-1].deployedAt] | @tsv' | \
                  while IFS=$'\t' read -r app pr repo deployed; do
                    [ -z "$pr" ] && continue
                    deployed_epoch=$(date -u -d "$deployed" +%s 2>/dev/null || echo 0)
                    pr_state=$(curl -fsS -H "Authorization: token $FORGEJO_TOKEN" \
                      "$FORGEJO_API/repos/schnappy/$repo/issues/$pr" \
                      | jq -r '.state // "unknown"')
                    pr_closed_at=$(curl -fsS -H "Authorization: token $FORGEJO_TOKEN" \
                      "$FORGEJO_API/repos/schnappy/$repo/issues/$pr" \
                      | jq -r '.closed_at // ""')
                    if [ "$pr_state" = "closed" ] && [ -n "$pr_closed_at" ]; then
                      closed_epoch=$(date -u -d "$pr_closed_at" +%s)
                      if [ $((now_epoch - closed_epoch)) -gt $closed_grace ]; then
                        echo "[prune-app] $app — PR closed > ${CLOSED_GRACE_HOURS}h ago"
                        kubectl delete application -n argocd "$app"
                        continue
                      fi
                    fi
                    if [ $((now_epoch - deployed_epoch)) -gt $stale_secs ]; then
                      echo "[prune-app] $app — head SHA stale > ${STALE_DAYS}d"
                      kubectl delete application -n argocd "$app"
                    fi
                  done

                  # ── 2. Vault prefix GC ───────────────────────────────
                  if [ -z "${VAULT_TOKEN:-}" ]; then
                    echo "[vault-gc] VAULT_TOKEN not set — skipping (provision secret/argocd/vault-cleanup-token to enable)"
                    exit 0
                  fi

                  # Snapshot live PR-env apps so we know what to keep.
                  live_apps=$(kubectl get application -n argocd -l preview-env=true \
                    -o jsonpath='{.items[*].metadata.labels.pr-number}' || echo "")

                  prefixes=$(curl -sf -X LIST -H "X-Vault-Token: $VAULT_TOKEN" \
                    "$VAULT_ADDR/v1/secret/metadata/" \
                    | jq -r '.data.keys[]?' \
                    | grep -E '^schnappy-pr-[0-9]+/$' || true)

                  for prefix in $prefixes; do
                    pr_num=$(echo "$prefix" | sed -E 's|^schnappy-pr-([0-9]+)/$|\1|')
                    if echo " $live_apps " | grep -q " $pr_num "; then
                      continue   # still in use; skip
                    fi
                    # Live App is gone — purge every key under the prefix.
                    keys=$(curl -sfk -X LIST -H "X-Vault-Token: $VAULT_TOKEN" \
                      "$VAULT_ADDR/v1/secret/metadata/${prefix%/}" \
                      | jq -r '.data.keys[]?' || true)
                    for k in $keys; do
                      echo "[vault-gc] purge secret/${prefix}${k}"
                      curl -sfk -X DELETE -H "X-Vault-Token: $VAULT_TOKEN" \
                        "$VAULT_ADDR/v1/secret/metadata/${prefix}${k}" >/dev/null
                    done
                  done
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: [ALL]
                readOnlyRootFilesystem: true
              volumeMounts:
                - { name: tmp, mountPath: /tmp }
          volumes:
            - { name: tmp, emptyDir: {} }
