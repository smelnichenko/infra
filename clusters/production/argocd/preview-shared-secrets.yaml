# Plan 067 §1 (ClusterExternalSecret) — replicate shared infra secrets
# into every per-PR namespace as it's created. Per-PR namespaces inherit
# Kafka SCRAM creds, Scylla agent password, MinIO client creds, and
# Keycloak realm token without ESO needing to be reconfigured per env.
apiVersion: external-secrets.io/v1
kind: ClusterExternalSecret
metadata:
  name: schnappy-shared-kafka
spec:
  externalSecretName: schnappy-shared-kafka
  namespaceSelectors:
    - matchLabels:
        preview-env: "true"
  refreshTime: 1h
  externalSecretSpec:
    secretStoreRef:
      name: vault-backend
      kind: ClusterSecretStore
    target:
      name: schnappy-shared-kafka
    data:
      - secretKey: KAFKA_BOOTSTRAP_SERVERS
        remoteRef: { key: schnappy/preview-kafka, property: bootstrap_servers }
      - secretKey: KAFKA_SCRAM_USER
        remoteRef: { key: schnappy/preview-kafka, property: scram_user }
      - secretKey: KAFKA_SCRAM_PASSWORD
        remoteRef: { key: schnappy/preview-kafka, property: scram_password }
---
