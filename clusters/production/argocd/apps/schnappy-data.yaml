apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: schnappy-data
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: http://forgejo-http.forgejo.svc:3000/schnappy/platform.git
      targetRevision: main
      path: helm/schnappy-data
      helm:
        releaseName: schnappy
        valueFiles:
          - $values/clusters/production/schnappy-data/values.yaml
    - repoURL: http://forgejo-http.forgejo.svc:3000/schnappy/infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: schnappy
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
