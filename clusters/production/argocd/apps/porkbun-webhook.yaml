apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: porkbun-webhook
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://talinx.github.io/cert-manager-webhook-porkbun
    chart: cert-manager-webhook-porkbun
    targetRevision: "*"
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
