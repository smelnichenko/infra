apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: porkbun-webhook
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://talinx.github.io/cert-manager-webhook-porkbun
    chart: cert-manager-webhook-porkbun
    targetRevision: "*"
    helm:
      parameters:
        - name: image.tag
          value: "1.0.0"
        - name: image.pullPolicy
          value: "Always"
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
