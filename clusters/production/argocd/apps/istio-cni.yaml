apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-cni
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://istio-release.storage.googleapis.com/charts
      chart: cni
      targetRevision: 1.25.2
      helm:
        releaseName: istio-cni
        valueFiles:
          - $values/clusters/production/istio/cni-values.yaml
    - repoURL: https://git.pmon.dev/schnappy/infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - ServerSideApply=true
      # ServerSideDiff makes Argo compute the diff via API-server
      # dry-run, so fields the apiserver defaults (maxSurge,
      # revisionHistoryLimit, ...) don't show as perpetual drift.
      - ServerSideDiff=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    # Fields the apiserver defaults that the chart doesn't declare;
    # ServerSideDiff alone wasn't clearing the status flag.
    - group: apps
      kind: DaemonSet
      name: istio-cni-node
      jsonPointers:
        - /spec/revisionHistoryLimit
        - /spec/updateStrategy/rollingUpdate/maxSurge
