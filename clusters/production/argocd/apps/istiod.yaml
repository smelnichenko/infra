apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istiod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://istio-release.storage.googleapis.com/charts
      chart: istiod
      targetRevision: 1.25.2
      helm:
        releaseName: istiod
        valueFiles:
          - $values/clusters/production/istio/istiod-values.yaml
    - repoURL: https://git.pmon.dev/schnappy/infra.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      # CSA (default, no ServerSideApply) — Argo's compare uses the
      # kubectl last-applied-configuration annotation as desired state,
      # which contains exactly the chart-rendered fields. Apiserver
      # defaults (probe defaults, dnsPolicy, strategy.type, etc.) are
      # not in that annotation, so they're not compared and don't show
      # as drift. SSA was tried but caused perpetual OutOfSync because
      # it claims fieldsV1 ownership broadly.
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jsonPointers:
        - /webhooks
    - group: apps
      kind: Deployment
      name: istiod
      jsonPointers:
        - /spec/revisionHistoryLimit
        - /spec/progressDeadlineSeconds
        - /spec/strategy/rollingUpdate/maxSurge
        - /spec/strategy/rollingUpdate/maxUnavailable
        - /spec/replicas
      # HPA writes via kube-controller-manager; ignoring its
      # field-management drops replicas + a few other auto-set
      # fields from the compare cleanly. Without this, Argo's
      # compare-state flags the Deployment OutOfSync forever even
      # though `argocd app diff` shows no actual diff (v3.3.x
      # compare-vs-diff divergence).
      managedFieldsManagers:
        - kube-controller-manager
