# Plan 067 — Forgejo readonly token consumed by the schnappy-pr-envs
# ApplicationSet (PullRequest generator). Vault path:
#   secret/argocd/forgejo-readonly { token: <forgejo PAT, public PR scope only> }
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-readonly-token
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: forgejo-readonly-token
  data:
    - secretKey: token
      remoteRef:
        key: argocd/forgejo-readonly
        property: token
