vault:
  secretsEnabled: true

networkPolicies:
  enabled: true

sonarqube:
  enabled: true
  existingSecret: schnappy-sonarqube
  image: sonarqube:26.3.0.120487-community
  javaOpts: -Xms1g -Xmx1g
  ingress:
    enabled: false
  storage:
    size: 10Gi
    storageClass: local-path
  resources:
    requests: { cpu: 200m, memory: 2Gi }
    limits: { cpu: 2000m, memory: 4Gi }
  postgres:
    image: postgres:17-alpine
  postgresStorage:
    size: 5Gi
    storageClass: local-path
  postgresResources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 512Mi }
  setup:
    enabled: true
    projects:
      - key: schnappy-monitor
        name: Schnappy Monitor
      - key: schnappy-admin
        name: Schnappy Admin
      - key: schnappy-chat
        name: Schnappy Chat
      - key: schnappy-chess
        name: Schnappy Chess
      - key: schnappy-gateway
        name: Schnappy Gateway
      - key: schnappy-site
        name: Schnappy Site
        gate: Frontend
      - key: schnappy-platform
        name: Schnappy Platform
      - key: schnappy-ops
        name: Schnappy Ops
