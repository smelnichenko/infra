vault:
  secretsEnabled: true
  secretPathPrefix: "secret/data/schnappy"

networkPolicies:
  enabled: true

postgres:
  enabled: false

redis:
  enabled: false

kafka:
  enabled: false

scylla:
  enabled: false

scyllaOperator:
  enabled: false

minio:
  enabled: true
  existingSecret: schnappy-infra-minio
  bucket: mimir-blocks
  buckets:
    - mimir-blocks
    - tempo-traces
    - hyperfoil-reports
  image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
  storage:
    size: 10Gi
    storageClass: local-path
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

strimzi:
  enabled: false

cnpg:
  enabled: false

aptCache:
  enabled: true
  resources:
    requests: { cpu: 25m, memory: 32Mi, ephemeral-storage: 64Mi }
    limits: { cpu: 200m, memory: 128Mi, ephemeral-storage: 256Mi }
  storage:
    size: 10Gi
    storageClass: local-path
