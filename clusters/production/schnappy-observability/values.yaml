vault:
  secretsEnabled: true

networkPolicies:
  enabled: true

elk:
  enabled: true
  elasticsearch:
    existingSecret: schnappy-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.13
    javaOpts: -Xms2g -Xmx2g
    replicas: 1
    retention:
      days: 30
    storage:
      size: 50Gi
      storageClass: local-path
    resources:
      requests: { cpu: 250m, memory: 2Gi }
      limits: { cpu: 3000m, memory: 6Gi }
  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.13
    replicas: 1
    host: logs.pmon.dev
    ingress:
      enabled: false
    resources:
      requests: { cpu: 100m, memory: 1Gi }
      limits: { cpu: 1000m, memory: 2Gi }
  fluentbit:
    image: cr.fluentbit.io/fluent/fluent-bit:4.2.3.1
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 1000m, memory: 512Mi }

prometheus:
  enabled: true
  scrapeInterval: 15s
  woodpecker:
    enabled: false

gateway:
  enabled: true
  name: schnappy-infra-gateway
  namespace: schnappy-infra
  hosts:
    grafana: grafana.pmon.dev
    logs: logs.pmon.dev
    reports: reports.pmon.dev

mimir:
  enabled: true
  image: grafana/mimir:2.17.8
  retention: 90d
  minioSecret: schnappy-infra-minio
  minioEndpoint: schnappy-infra-minio.schnappy-infra.svc:9000
  storage: 5Gi
  storageClassName: local-path
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits: { cpu: 2000m, memory: 2Gi }

tempo:
  enabled: true
  image: grafana/tempo:2.7.2
  retention: 336h
  minioSecret: schnappy-infra-minio
  minioEndpoint: schnappy-infra-minio.schnappy-infra.svc:9000
  storage: 2Gi
  storageClassName: local-path
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits: { cpu: 1000m, memory: 2Gi }

grafana:
  enabled: true
  existingSecret: schnappy-grafana
  image: grafana/grafana:12.4.2
  host: grafana.pmon.dev
  ingress:
    enabled: false
  oauth:
    enabled: true
    name: Keycloak
    authUrl: https://auth.pmon.dev/realms/schnappy/protocol/openid-connect/auth
    tokenUrl: https://auth.pmon.dev/realms/schnappy/protocol/openid-connect/token
    apiUrl: https://auth.pmon.dev/realms/schnappy/protocol/openid-connect/userinfo
    scopes: "openid profile email"
    autoLogin: false
  storage:
    size: 5Gi
    storageClass: local-path
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 1Gi }

alertmanager:
  enabled: true
  existingSecret: schnappy-alertmanager
  alertEmailTo: sergei.melnichenko@gmail.com
  alertEmailFrom: alerts@pmon.dev
  resources:
    requests: { cpu: 25m, memory: 128Mi }
    limits: { cpu: 200m, memory: 256Mi }
  storage:
    size: 1Gi
    storageClass: local-path

kubeStateMetrics:
  enabled: true
  resources:
    requests: { cpu: 25m, memory: 128Mi }
    limits: { cpu: 200m, memory: 512Mi }

reports:
  enabled: true
  image: nginx:1.27-alpine
  minioEndpoint: schnappy-infra-minio.schnappy-infra.svc:9000
