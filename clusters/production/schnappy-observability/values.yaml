vault:
  secretsEnabled: true

networkPolicies:
  enabled: true

elk:
  enabled: true
  elasticsearch:
    existingSecret: schnappy-elasticsearch
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.8
    javaOpts: -Xms2g -Xmx2g
    replicas: 1
    retention:
      days: 30
    storage:
      size: 50Gi
      storageClass: local-path
    resources:
      requests: { cpu: 250m, memory: 2Gi }
      limits: { cpu: 4000m, memory: 4Gi }
  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.8
    replicas: 1
    ingress:
      enabled: true
      className: traefik
      host: logs.pmon.dev
      tls:
        enabled: true
        clusterIssuer: letsencrypt-dns
        secretName: logs-pmon-dev-tls
    resources:
      requests: { cpu: 100m, memory: 1Gi }
      limits: { cpu: 1000m, memory: 2Gi }
  fluentbit:
    image: cr.fluentbit.io/fluent/fluent-bit:4.2.3
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 1000m, memory: 512Mi }

prometheus:
  enabled: true
  image: prom/prometheus:v3.10.0
  retention: 30d
  scrapeInterval: 15s
  storage:
    size: 20Gi
    storageClass: local-path
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits: { cpu: 2000m, memory: 4Gi }
  vault:
    enabled: true
  woodpecker:
    enabled: true

grafana:
  enabled: true
  existingSecret: schnappy-grafana
  image: grafana/grafana:12.4.0
  ingress:
    enabled: true
    className: traefik
    host: grafana.pmon.dev
    tls:
      enabled: true
      clusterIssuer: letsencrypt-dns
      secretName: grafana-pmon-dev-tls
  oauth:
    enabled: true
    name: Keycloak
    authUrl: https://auth.pmon.dev/realms/schnappy/protocol/openid-connect/auth
    tokenUrl: http://schnappy-keycloak.schnappy.svc:8080/realms/schnappy/protocol/openid-connect/token
    apiUrl: http://schnappy-keycloak.schnappy.svc:8080/realms/schnappy/protocol/openid-connect/userinfo
    scopes: "openid profile email"
    autoLogin: false
  storage:
    size: 5Gi
    storageClass: local-path
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 1Gi }

alertmanager:
  enabled: true
  existingSecret: schnappy-alertmanager
  alertEmailTo: sergei.melnichenko@gmail.com
  alertEmailFrom: alerts@pmon.dev
  resources:
    requests: { cpu: 25m, memory: 128Mi }
    limits: { cpu: 200m, memory: 256Mi }
  storage:
    size: 1Gi
    storageClass: local-path

kubeStateMetrics:
  enabled: true
  resources:
    requests: { cpu: 25m, memory: 128Mi }
    limits: { cpu: 200m, memory: 512Mi }
