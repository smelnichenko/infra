vault:
  secretsEnabled: true

networkPolicies:
  enabled: true

clickhouse:
  enabled: true
  existingSecret: schnappy-clickhouse
  image: clickhouse/clickhouse-server:24.8-alpine
  resources:
    requests: { cpu: "100m", memory: "512Mi" }
    limits:   { cpu: "2",    memory: "8Gi" }
  storage:
    size: 20Gi
    storageClass: local-path
  retention:
    days: 30

fluentbit:
  enabled: true
  image: cr.fluentbit.io/fluent/fluent-bit:4.2.3.1
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "1000m", memory: "512Mi" }

openobserve:
  # Retired. Logs live in ClickHouse and are queried via Grafana's
  # ClickHouse-Logs datasource (Explore + tracesToLogsV2 from Tempo).
  # OO was a duplicate store with extra UI; the operational cost
  # (4Gi pod, periodic compaction stalls needing Istio retry masks,
  # tuning every workload bump) outweighed the Discover-style UI value.
  # Set enabled=false to drop the StatefulSet, NetworkPolicy,
  # DestinationRule/VirtualService, fluent-bit OO output block, and
  # let logs.pmon.dev fall back to its redirect to grafana/explore.
  enabled: false
  image: public.ecr.aws/zinclabs/openobserve:v0.14.7
  existingSecret: schnappy-openobserve
  resources:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "2",    memory: "4Gi" }
  storage:
    size: 10Gi
    storageClass: local-path
  retention:
    days: 14
  externalSecret:
    enabled: true
    refreshInterval: 15m

prometheus:
  enabled: true
  scrapeInterval: 15s
  scrapeNamespaces:
    - schnappy-production
    - schnappy-test
  woodpecker:
    enabled: false

gateway:
  enabled: true
  name: schnappy-infra-gateway
  namespace: schnappy-infra
  hosts:
    grafana: grafana.pmon.dev
    logs: logs.pmon.dev
    reports: reports.pmon.dev
    alerts: alerts.pmon.dev
    runbooks: runbooks.pmon.dev

mimir:
  enabled: true
  image: grafana/mimir:2.17.8
  retention: 90d
  minioSecret: schnappy-infra-minio
  minioEndpoint: schnappy-infra-minio.schnappy-infra.svc:9000
  storage: 5Gi
  storageClassName: local-path
  resources:
    requests: { cpu: 200m, memory: 512Mi }
    limits: { cpu: 2000m, memory: 2Gi }

tempo:
  enabled: true
  image: grafana/tempo:2.7.2
  retention: 336h
  minioSecret: schnappy-infra-minio
  minioEndpoint: schnappy-infra-minio.schnappy-infra.svc:9000
  storage: 2Gi
  storageClassName: local-path
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits: { cpu: 1000m, memory: 2Gi }

grafana:
  enabled: true
  existingSecret: schnappy-grafana
  image: grafana/grafana:12.4.2
  host: grafana.pmon.dev
  ingress:
    enabled: false
  oauth:
    enabled: true
    name: Keycloak
    authUrl: https://auth.pmon.dev/realms/schnappy/protocol/openid-connect/auth
    tokenUrl: https://auth.pmon.dev/realms/schnappy/protocol/openid-connect/token
    apiUrl: https://auth.pmon.dev/realms/schnappy/protocol/openid-connect/userinfo
    scopes: "openid profile email"
    autoLogin: false
  storage:
    size: 5Gi
    storageClass: local-path
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 1000m, memory: 1Gi }

alertmanager:
  enabled: true
  logLevel: debug
  existingSecret: schnappy-alertmanager
  alertEmailTo: sergei.melnichenko@gmail.com
  alertEmailFrom: alerts@pmon.dev
  resources:
    requests: { cpu: 25m, memory: 128Mi }
    limits: { cpu: 200m, memory: 256Mi }
  storage:
    size: 1Gi
    storageClass: local-path

kubeStateMetrics:
  enabled: true
  resources:
    requests: { cpu: 25m, memory: 128Mi }
    limits: { cpu: 200m, memory: 512Mi }

reports:
  enabled: true
  image: nginx:1.27-alpine
  minioEndpoint: schnappy-infra-minio.schnappy-infra.svc:9000

runbooks:
  enabled: true
  image: nginx:1.27-alpine
