apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Shared sources (HelmRepository definitions)
  - sources

  # Infrastructure (dependency order: cert-manager → ESO → vault → monitor)
  - cert-manager
  - external-secrets
  - vault
  - forgejo
  - woodpecker
  - velero

  # Application
  - monitor
