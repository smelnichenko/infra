# Velero Helm release
# Credentials secret (velero-credentials) created by Ansible setup-velero.yml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: velero
      version: "11.4.0"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.11.1
        volumeMounts:
          - name: plugins
            mountPath: /target
    credentials:
      useSecret: true
      existingSecret: velero-credentials
    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: velero
          config:
            region: us-east-1
            s3ForcePathStyle: "true"
            s3Url: http://minio-backup.velero.svc:9000
      volumeSnapshotLocation: []
      defaultVolumesToFsBackup: true
      features: ""
    deployNodeAgent: true
    snapshotsEnabled: false
    schedules:
      monitor-daily:
        disabled: false
        schedule: "0 2 * * *"
        useOwnerReferencesInBackup: false
        template:
          ttl: 168h
          includedNamespaces:
            - monitor
          defaultVolumesToFsBackup: true
      full-weekly:
        disabled: false
        schedule: "0 3 * * 0"
        useOwnerReferencesInBackup: false
        template:
          ttl: 720h
          includedNamespaces:
            - "*"
          defaultVolumesToFsBackup: true
    kubectl:
      image:
        repository: docker.io/bitnami/kubectl
        tag: latest
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 512Mi
