# Forgejo Helm release
# Admin credentials are in the Helm values (initial setup only — Forgejo hashes on first boot)
# Post-install: create repos, push code (still done by Ansible or manually)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
  namespace: forgejo
spec:
  interval: 1h
  timeout: 10m
  chart:
    spec:
      chart: forgejo
      version: "16.2.0"
      sourceRef:
        kind: HelmRepository
        name: forgejo
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    gitea:
      config:
        server:
          DOMAIN: git.pmon.dev
          ROOT_URL: "https://git.pmon.dev/"
          SSH_DOMAIN: git.pmon.dev
          DISABLE_SSH: true
          LFS_START_SERVER: true
        database:
          DB_TYPE: sqlite3
        service:
          DISABLE_REGISTRATION: true
        actions:
          ENABLED: false
        webhook:
          ALLOWED_HOST_LIST: private
        repository:
          DEFAULT_BRANCH: main
          DEFAULT_PRIVATE: true
        log:
          LEVEL: Warn
    image:
      rootless: true
    ingress:
      enabled: true
      className: traefik
      hosts:
        - host: git.pmon.dev
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: forgejo-tls
          hosts:
            - git.pmon.dev
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-dns
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    persistence:
      enabled: true
      size: 20Gi
      storageClass: local-path
    redis-cluster:
      enabled: false
    postgresql:
      enabled: false
    postgresql-ha:
      enabled: false
