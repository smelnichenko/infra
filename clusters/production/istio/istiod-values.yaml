cni:
  enabled: true

meshConfig:
  accessLogFile: ""
  enableTracing: true
  defaultConfig:
    holdApplicationUntilProxyStarts: true
    tracing:
      zipkin:
        address: schnappy-tempo.schnappy.svc:9411
      sampling: 10.0

pilot:
  env:
    ENABLE_NATIVE_SIDECARS: "false"
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
