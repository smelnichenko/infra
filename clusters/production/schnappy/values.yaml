vault:
  secretsEnabled: true

app:
  replicas: 1
  javaOpts: -Xmx2g -XX:+UseZGC -XX:+UseStringDeduplication
  image:
    pullPolicy: IfNotPresent
    repository: git.pmon.dev/schnappy/monitor
    tag: "a9d192a"  # schnappy-monitor
  ingress:
    enabled: false
  hikari:
    maximumPoolSize: 20
    minimumIdle: 5
    connectionTimeout: 20000
    idleTimeout: 300000
    maxLifetime: 1200000
  resources:
    requests: { cpu: 200m, memory: 2Gi }
    limits: { cpu: 6000m, memory: 4Gi }

site:
  enabled: true
  replicas: 1
  dnsResolver: "10.43.0.10"
  image:
    pullPolicy: IfNotPresent
    repository: git.pmon.dev/schnappy/site
    tag: "ed6acf1"  # site
  resources:
    requests: { cpu: 100m, memory: 64Mi }
    limits: { cpu: 2000m, memory: 256Mi }

games: []
#  - name: game-scp
#    path: game
#    image:
#      repository: git.pmon.dev/schnappy/game-scp
#      tag: "7e5ee2e"  # game-scp
#    resources:
#      requests: { cpu: 25m, memory: 32Mi }
#      limits: { cpu: 100m, memory: 64Mi }

auth:
  existingSecret: schnappy-auth
  registrationEnabled: true
  secureCookies: true
  tokenExpiration: 1h
  registrationApproval:
    mode: ai
    defaultGroup: Users

captcha:
  enabled: true

chess:
  enabled: true

chat:
  e2eEnabled: false


monitor:
  enabled: true
  http:
    connectTimeout: 10s
    readTimeout: 30s
    userAgent: MonitorBot/1.0

networkPolicies:
  enabled: true

ai:
  enabled: true
  existingSecret: schnappy-ai
  model: claude-haiku-4-5-20251001

mail:
  enabled: true
  existingSecret: schnappy-mail
  host: smtp.resend.com
  port: "587"
  username: resend
  fromAddress: noreply@pmon.dev
  appUrl: https://pmon.dev

webhook:
  enabled: true
  existingSecret: schnappy-webhook

envoyGateway:
  enabled: false

gateway:
  enabled: false
  image:
    repository: git.pmon.dev/schnappy/api-gateway
    pullPolicy: IfNotPresent
    tag: "d2a8de9"  # api-gateway
  replicas: 1
  javaOpts: -Xmx1g -XX:+UseZGC -Dreactor.netty.ioWorkerCount=8
  cors:
    allowedOrigins: "https://pmon.dev"
  resources:
    requests: { cpu: 500m, memory: 1Gi }
    limits: { cpu: 4000m, memory: 2Gi }

admin:
  enabled: true
  image:
    repository: git.pmon.dev/schnappy/admin
    pullPolicy: IfNotPresent
    tag: "3a39288"  # admin-service
  replicas: 1
  javaOpts: -Xmx1g -XX:+UseZGC
  resources:
    requests: { cpu: 100m, memory: 1Gi }
    limits: { cpu: 2000m, memory: 2Gi }

chatService:
  enabled: true
  image:
    repository: git.pmon.dev/schnappy/chat
    pullPolicy: IfNotPresent
    tag: "19b3364"  # chat-service
  replicas: 1
  javaOpts: -Xmx1g -XX:+UseZGC
  resources:
    requests: { cpu: 100m, memory: 1Gi }
    limits: { cpu: 3000m, memory: 2Gi }

chessService:
  enabled: true
  image:
    repository: git.pmon.dev/schnappy/chess
    pullPolicy: IfNotPresent
    tag: "01b8f4d"  # chess-service
  replicas: 1
  javaOpts: -Xmx1g -XX:+UseZGC
  resources:
    requests: { cpu: 100m, memory: 1Gi }
    limits: { cpu: 3000m, memory: 2Gi }

smokeTest:
  enabled: true
  namespace: schnappy-test
  image: grafana/k6:0.57.0
  schedule: "0 6 * * *"
  clientSecretName: schnappy-k6-smoke
  baseUrl: https://pmon.dev

hyperfoil:
  enabled: true
  reportsUrl: https://reports.pmon.dev

# Cross-chart references (secret names for env var mounts, keycloak for admin service)
postgres:
  database: monitor
  existingSecret: schnappy-postgres
redis:
  existingSecret: schnappy-redis
minio:
  existingSecret: schnappy-minio
alertmanager:
  enabled: true
  existingSecret: schnappy-alertmanager
  alertEmailTo: sergei.melnichenko@gmail.com
  alertEmailFrom: alerts@pmon.dev
keycloak:
  enabled: true
  hostname: auth.pmon.dev
  existingSecret: schnappy-keycloak
  clients:
    adminService:
      enabled: true
