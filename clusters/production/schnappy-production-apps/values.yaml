vault:
  secretsEnabled: true

alerts:
  enabled: true

app:
  replicas: 1
  javaOpts: -Xmx2g -XX:+UseZGC -XX:+UseStringDeduplication
  image:
    pullPolicy: IfNotPresent
    repository: git.pmon.dev/schnappy/monitor
    tag: "e75381f"  # monitor
  ingress:
    enabled: false
  hikari:
    maximumPoolSize: 50
    minimumIdle: 5
    connectionTimeout: 20000
    idleTimeout: 300000
    maxLifetime: 1200000
  resources:
    requests: { cpu: 3000m, memory: 3Gi, ephemeral-storage: 256Mi }
    limits: { cpu: 6000m, memory: 4Gi, ephemeral-storage: 1Gi }

site:
  enabled: true
  replicas: 1
  dnsResolver: "10.43.0.10"
  image:
    pullPolicy: IfNotPresent
    repository: git.pmon.dev/schnappy/site
    tag: "471283b"  # site
  resources:
    requests: { cpu: 100m, memory: 64Mi }
    limits: { cpu: 2000m, memory: 256Mi }

games:
  - name: game-scp
    path: game
    image:
      repository: git.pmon.dev/schnappy/game-scp
      tag: "b8b7ef8"  # game-scp
    resources:
      requests: { cpu: 25m, memory: 32Mi }
      limits: { cpu: 100m, memory: 64Mi }

auth:
  existingSecret: schnappy-production-auth
  registrationEnabled: true
  secureCookies: true
  tokenExpiration: 1h
  registrationApproval:
    mode: ai
    defaultGroup: Users

captcha:
  enabled: true

chess:
  enabled: true

chat:
  e2eEnabled: false


monitor:
  enabled: true
  http:
    connectTimeout: 10s
    readTimeout: 30s
    userAgent: MonitorBot/1.0

networkPolicies:
  enabled: true

strimzi:
  enabled: true

cnpg:
  enabled: true

scyllaOperator:
  enabled: true

ai:
  enabled: true
  existingSecret: schnappy-production-ai
  model: claude-haiku-4-5-20251001

mail:
  enabled: true
  existingSecret: schnappy-production-mail
  host: smtp.resend.com
  port: "587"
  username: resend
  fromAddress: noreply@pmon.dev
  appUrl: https://pmon.dev

webhook:
  enabled: true
  existingSecret: schnappy-production-webhook




admin:
  enabled: true
  image:
    repository: git.pmon.dev/schnappy/admin
    pullPolicy: IfNotPresent
    tag: "6bdbab4"  # admin
  replicas: 1
  javaOpts: -Xmx1g -XX:+UseZGC
  resources:
    requests: { cpu: 100m, memory: 512Mi }
    limits: { cpu: 2000m, memory: 2Gi }

chatService:
  enabled: true
  image:
    repository: git.pmon.dev/schnappy/chat
    pullPolicy: IfNotPresent
    tag: "85eedee"  # chat
  replicas: 1
  javaOpts: -Xmx1g -XX:+UseZGC
  resources:
    requests: { cpu: 1000m, memory: 1536Mi }
    limits: { cpu: 3000m, memory: 2Gi }

chessService:
  enabled: true
  image:
    repository: git.pmon.dev/schnappy/chess
    pullPolicy: IfNotPresent
    tag: "1b1d344"  # chess
  replicas: 1
  javaOpts: -Xmx1g -XX:+UseZGC
  resources:
    requests: { cpu: 1000m, memory: 1536Mi }
    limits: { cpu: 3000m, memory: 2Gi }

tracing:
  enabled: true
  # gRPC OTLP (port 4317) — chart default. Removing the explicit
  # endpoint override here so chart-default `tempoEndpoint` +
  # `tempoTransport: grpc` apply.
  samplingProbability: "0.005"

smokeTest:
  enabled: true
  image: grafana/k6:1.7.1
  schedule: "0 6 * * *"
  baseUrl: https://pmon.dev
  clientSecretName: schnappy-k6-smoke
  baseUrl: https://pmon.dev

hyperfoil:
  enabled: true
  reportsUrl: https://reports.pmon.dev
  clientSecretName: schnappy-hyperfoil
  minioEndpoint: schnappy-infra-minio.schnappy-infra.svc:9000

# Cross-chart references (secret names for env var mounts, keycloak for admin service)
postgres:
  database: monitor
  existingSecret: schnappy-production-postgres
valkey:
  existingSecret: schnappy-production-valkey
minio:
  existingSecret: schnappy-production-minio
  alertEmailTo: sergei.melnichenko@gmail.com
  alertEmailFrom: alerts@pmon.dev
keycloak:
  enabled: true
  hostname: auth.pmon.dev
  existingSecret: schnappy-keycloak
  clients:
    adminService:
      enabled: true
