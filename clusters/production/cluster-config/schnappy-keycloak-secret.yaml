apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: schnappy-keycloak
  namespace: schnappy-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: schnappy-keycloak
  data:
    - secretKey: ADMIN_SERVICE_CLIENT_SECRET
      remoteRef:
        key: secret/data/schnappy/keycloak
        property: admin_service_client_secret
    - secretKey: FORGEJO_CLIENT_SECRET
      remoteRef:
        key: secret/data/schnappy/keycloak
        property: forgejo_client_secret
    - secretKey: ARGOCD_CLIENT_SECRET
      remoteRef:
        key: secret/data/schnappy/keycloak
        property: argocd_client_secret
    - secretKey: K6_SMOKE_CLIENT_SECRET
      remoteRef:
        key: secret/data/schnappy/keycloak
        property: k6_smoke_client_secret
