apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: forgejo-admin-es
  namespace: forgejo
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: forgejo-admin
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/schnappy/forgejo
        property: admin_username
    - secretKey: password
      remoteRef:
        key: secret/data/schnappy/forgejo
        property: admin_password
    - secretKey: email
      remoteRef:
        key: secret/data/schnappy/forgejo
        property: admin_email
