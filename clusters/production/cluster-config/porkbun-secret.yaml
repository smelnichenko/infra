# Porkbun DNS API credentials for cert-manager DNS-01 challenges
# Needed in schnappy namespace (where Certificates/Challenges live)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: porkbun-secret-es
  namespace: schnappy-production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: porkbun-secret
  data:
    - secretKey: PORKBUN_API_KEY
      remoteRef:
        key: secret/data/schnappy/porkbun
        property: api_key
    - secretKey: PORKBUN_SECRET_API_KEY
      remoteRef:
        key: secret/data/schnappy/porkbun
        property: secret_api_key
---
# Also in cert-manager namespace (webhook pod namespace fallback)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: porkbun-secret-es
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: porkbun-secret
  data:
    - secretKey: PORKBUN_API_KEY
      remoteRef:
        key: secret/data/schnappy/porkbun
        property: api_key
    - secretKey: PORKBUN_SECRET_API_KEY
      remoteRef:
        key: secret/data/schnappy/porkbun
        property: secret_api_key
