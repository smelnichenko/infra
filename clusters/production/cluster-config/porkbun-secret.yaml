apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: porkbun-secret-es
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: porkbun-secret
  data:
    - secretKey: PORKBUN_API_KEY
      remoteRef:
        key: secret/data/schnappy/porkbun
        property: api_key
    - secretKey: PORKBUN_SECRET_API_KEY
      remoteRef:
        key: secret/data/schnappy/porkbun
        property: secret_api_key
