apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: schnappy-default-deny
  namespace: schnappy
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Istio HBONE tunnel (ztunnel mTLS)
    - ports:
        - protocol: TCP
          port: 15008
    # Istio health probes
    - from:
        - ipBlock:
            cidr: 169.254.7.127/32
      ports:
        - protocol: TCP
          port: 15021
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        # Istio HBONE tunnel (ztunnel mTLS)
        - protocol: TCP
          port: 15008
    # Istio ztunnel health probes
    - to:
        - ipBlock:
            cidr: 169.254.7.127/32
      ports:
        - protocol: TCP
          port: 15021
    # Cross-namespace egress (Istio gateway → non-mesh services)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: forgejo
      ports:
        - protocol: TCP
          port: 3000
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: woodpecker
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 9000
