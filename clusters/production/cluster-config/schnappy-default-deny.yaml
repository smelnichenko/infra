apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: schnappy-default-deny
  namespace: schnappy
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Intra-namespace traffic (sidecars communicate on app ports)
    - from:
        - podSelector: {}
    # Istio gateway: allow external traffic (HAProxy) on 80/443
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
    # Cross-namespace ingress (argocd, woodpecker → schnappy services)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: woodpecker
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 443
    # Kubelet probes (node → pod)
    - ports:
        - protocol: TCP
          port: 15021
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Intra-namespace traffic (sidecars communicate on app ports)
    - to:
        - podSelector: {}
    # Istio control plane (istiod cert signing, xDS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 15012
        - protocol: TCP
          port: 15010
        - protocol: TCP
          port: 15014
        - protocol: TCP
          port: 443
    # Kubernetes API (prometheus operator, kube-state-metrics)
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # Pi services via VIP (Forgejo, Keycloak, Vault)
    - to:
        - ipBlock:
            cidr: 192.168.11.5/32
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8200
    # Gateway egress to test/ephemeral environments
    - to:
        - namespaceSelector:
            matchExpressions:
              - key: environment
                operator: Exists
    # Gateway egress to kube-system (Hubble UI)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
    # Cross-namespace egress (ArgoCD, Woodpecker)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: woodpecker
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 9000
