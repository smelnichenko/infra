apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: schnappy-test-default-deny
  namespace: schnappy-test
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
      ports:
        - protocol: TCP
          port: 8080
    # Gateway ingress (cross-namespace routing from prod gateway)
    - from:
        - namespaceSelector:
            matchLabels:
              gateway: "true"
          podSelector:
            matchLabels:
              gateway.istio.io/managed: istio.io-gateway-controller
    # Kubelet probes
    - ports:
        - protocol: TCP
          port: 15021
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Intra-namespace
    - to:
        - podSelector: {}
    # Istio control plane
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 15012
        - protocol: TCP
          port: 15010
        - protocol: TCP
          port: 15014
        - protocol: TCP
          port: 443
    # Kubernetes API
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
    # Pi services (Vault for ESO)
    - to:
        - ipBlock:
            cidr: 192.168.11.5/32
      ports:
        - protocol: TCP
          port: 8200
    # Observability (traces to prod Tempo)
    - to:
        - namespaceSelector:
            matchLabels:
              gateway: "true"
      ports:
        - protocol: TCP
          port: 4318
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: schnappy-test-quota
  namespace: schnappy-test
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "64"
    limits.memory: 48Gi
