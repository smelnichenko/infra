# ClusterSecretStore for Pi Vault (Consul storage, Keepalived VIP)
# CA cert in external-secrets namespace, ESO kubernetes auth role
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://192.168.11.5:8200"
      path: "secret"
      version: "v2"
      caProvider:
        type: Secret
        name: vault-pi-ca
        namespace: external-secrets
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-role"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
