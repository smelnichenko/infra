# ClusterSecretStore for Vault KV v2 backend
# Requires vault-ca-secret in vault namespace and ESO kubernetes auth role
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.vault.svc:8200"
      path: "secret"
      version: "v2"
      caProvider:
        type: Secret
        name: vault-ca-secret
        namespace: vault
        key: ca.crt
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-role"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
