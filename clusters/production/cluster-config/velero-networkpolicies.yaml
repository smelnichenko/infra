---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: velero-default-deny
  namespace: velero
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: velero-to-minio
  namespace: velero
spec:
  podSelector:
    matchLabels:
      app: minio-backup
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9000
