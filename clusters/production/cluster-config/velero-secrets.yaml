---
# Velero S3 credentials — uses Pi MinIO (192.168.11.5:9000)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-credentials-es
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: velero-credentials
    template:
      engineVersion: v2
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .access_key }}
          aws_secret_access_key={{ .secret_key }}
  data:
    - secretKey: access_key
      remoteRef:
        key: secret/data/schnappy/minio
        property: access_key
    - secretKey: secret_key
      remoteRef:
        key: secret/data/schnappy/minio
        property: secret_key
