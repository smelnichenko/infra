ipam:
  operator:
    clusterPoolIPv4PodCIDRList: ["10.42.0.0/16"]

kubeProxyReplacement: true
k8sServiceHost: 192.168.11.2
k8sServicePort: 6443

# Do not delete Istio CNI config from /etc/cni/net.d/
cni:
  exclusive: false

# Single node — native routing, no tunnel overhead
routingMode: native
ipv4NativeRoutingCIDR: 10.42.0.0/16

# eBPF masquerading (replaces nftables NAT)
bpf:
  masquerade: true

# Single node — 1 operator replica
operator:
  replicas: 1

# Hubble network observability
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

socketLB:
  enabled: false
